kind = "web"
previewPath = "/"
title = "ExpiryOS"
version = "1.0.0"
id = "artifacts/expiry-tracker"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23498

[services.development]
run = "pnpm --filter @workspace/expiry-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/expiry-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/expiry-tracker/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23498"
BASE_PATH = "/"
